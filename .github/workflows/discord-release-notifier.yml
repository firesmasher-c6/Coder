name: Notify Discord on Release

on:
  release:
    types: [published]

jobs:
  discord-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord Notification
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{"content": "@everyone 🚀 **New Release Published!**\n\n**Version:** ${{ github.event.release.tag_name }}\n**Name:** ${{ github.event.release.name }}\n**View Release:** ${{ github.event.release.html_url }}"}' \
               ${{ secrets.DISCORD_WEBHOOK_URL }}
