name: Coder
version: 2.2.9
main: me.coder.CoderPlugin
api-version: '1.21'

description: Execute Python, Lua, and Java scripts on your Minecraft server with expansion system support

commands:
  coder:
    description: Execute scripts, manage expansions, and manage the plugin
    usage: /coder <run|reload|load|unload|confirm|cancel|update|expansion> [options]
    permission: coder.admin
    permission-message: You must be an OP to use this command!
    aliases:
      - code

permissions:
  coder.admin:
    description: Allows execution and management of coder scripts, expansions, and version checking.
    default: op