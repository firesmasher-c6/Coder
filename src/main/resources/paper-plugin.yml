name: CodeDSL
version: 2.3.1
main: me.coder.codedsl.CodeDSLPlugin
description: A Domain Specific Language addon for the Coder plugin
author: Firesmasher
api-version: '1.21'

dependencies:
  server:
    Coder:
      load: BEFORE
      required: true

commands:
  codedsl:
    description: Execute and manage CodeDSL scripts
    usage: /codedsl <run|reload|load|unload|list|update> <filename>
    aliases:
      - cdsl
      - code-dsl
  codedsl-update:
    description: Check for CodeDSL updates
    usage: /codedsl update

permissions:
  codedsl.use:
    description: Allows usage of CodeDSL commands
    default: op
  codedsl.command:
    description: Allows running CodeDSL commands
    default: op
  codedsl.update:
    description: Allows checking for updates
    default: op